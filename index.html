<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadMy1040</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --deep: #3a3228; --accent: #7a9e7a; --bubble-bg: rgba(255,253,245,0.97); }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #b8c8d0; font-family: 'Jost', sans-serif; }

  /* ── shared background ── */
  .scene {
    position: fixed; inset: 0; z-index: 0;
    background: url('Welcome_Scene_Image.png') center center / cover no-repeat;
  }
  .scene-overlay {
    position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse 80% 60% at 50% 45%, rgba(255,255,255,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── particles ── */
  .particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
  .particle {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.82);
    box-shadow: 0 0 8px 3px rgba(255,255,255,0.5);
    animation: floatUp linear infinite;
  }

  /* ── music button ── */
  .music-btn {
    position: fixed; bottom: 28px; right: 32px; z-index: 300;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,253,245,0.45); backdrop-filter: blur(10px);
    border: 1px solid rgba(58,50,40,0.2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
  }
  .music-btn:hover { background: rgba(255,253,245,0.7); border-color: rgba(58,50,40,0.4); }
  .music-btn svg { width: 16px; height: 16px; fill: rgba(58,50,40,0.6); }

  /* ── transition veil ── */
  .veil {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(255,252,245,0); pointer-events: none;
    transition: background 0.6s ease;
  }
  .veil.go { background: rgba(255,252,245,1); }

  /* ════════════════════════════════
     WELCOME VIEW
  ════════════════════════════════ */
  #viewWelcome {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  #viewWelcome.hidden { display: none; }

  .lang-switcher {
    position: fixed; top: 24px; right: 32px; z-index: 20;
    display: flex; align-items: center; gap: 8px;
    opacity: 0; animation: fadeDown 1s ease forwards 1.8s;
  }
  .lang-btn {
    font-family: 'Jost', sans-serif; font-weight: 400;
    font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(40,32,22,0.75); background: none; border: none;
    cursor: pointer; padding: 4px 2px; transition: color 0.3s ease;
  }
  .lang-btn:hover, .lang-btn.active { color: rgba(40,32,22,1); }
  .lang-divider { font-weight: 200; color: rgba(58,50,40,0.3); font-size: 11px; }

  .headline {
    font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic;
    font-size: clamp(40px, 6vw, 74px); line-height: 1.18;
    color: var(--deep); text-align: center;
    text-shadow: 0 1px 24px rgba(255,250,240,0.9), 0 4px 40px rgba(255,248,230,0.6);
    opacity: 0; animation: fadeUp 1.4s ease forwards 0.7s;
    max-width: 680px; padding: 0 24px;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .headline em { font-style: normal; font-weight: 400; color: #4a3c28; }

  .btn-wrap { margin-top: 52px; opacity: 0; animation: fadeUp 1.4s ease forwards 1.2s; }
  .start-btn {
    display: inline-block; font-family: 'Jost', sans-serif; font-weight: 300;
    font-size: 14px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--deep); padding: 15px 48px;
    border: 1px solid rgba(58,50,40,0.28); border-radius: 40px;
    background: rgba(255,253,245,0.42); backdrop-filter: blur(10px);
    cursor: pointer; transition: all 0.45s ease; position: relative; overflow: hidden;
  }
  .start-btn::before {
    content: ''; position: absolute; inset: 0; border-radius: 40px;
    background: rgba(255,250,235,0.38); transform: scaleX(0);
    transform-origin: left; transition: transform 0.45s ease;
  }
  .start-btn:hover::before { transform: scaleX(1); }
  .start-btn:hover { border-color: rgba(58,50,40,0.45); letter-spacing: 0.38em; }
  .start-btn span { position: relative; z-index: 1; }

  .welcome-wordmark {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: 10px; letter-spacing: 0.55em; text-transform: uppercase;
    color: rgba(58,50,40,0.28); white-space: nowrap;
    opacity: 0; animation: fadeUp 1.4s ease forwards 2.1s; z-index: 20;
  }

  /* ════════════════════════════════
     FORM VIEW
  ════════════════════════════════ */
  #viewForm {
    position: fixed; inset: 0; z-index: 10;
    display: none;
  }
  #viewForm.visible { display: block; }

  .topbar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 100;
    height: 50px;
    background: rgba(253,248,240,0.88); backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(58,50,40,0.1);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
  }
  .topbar-wordmark {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: 15px; letter-spacing: 0.35em; text-transform: uppercase;
    color: rgba(58,50,40,0.65); cursor: pointer; background: none; border: none;
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .hint { font-size: 11px; letter-spacing: 0.1em; font-weight: 300; color: rgba(58,50,40,0.38); }
  .page-btn {
    font-family: 'Jost', sans-serif; font-weight: 300;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(58,50,40,0.5); background: none;
    border: 1px solid rgba(58,50,40,0.2); border-radius: 20px;
    padding: 5px 14px; cursor: pointer; transition: all 0.3s ease;
  }
  .page-btn.active, .page-btn:hover {
    color: var(--deep); border-color: rgba(58,50,40,0.5);
    background: rgba(255,250,240,0.6);
  }

  .scroll-wrap {
    position: absolute; inset: 0; top: 50px;
    overflow-y: auto; overflow-x: auto;
    display: flex; justify-content: center;
    padding: 32px 24px 60px;
  }

  .form-card {
    position: relative; display: inline-block; border-radius: 4px; flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(58,50,40,0.12), 0 20px 60px rgba(58,50,40,0.18), 0 0 0 1px rgba(255,255,255,0.6);
  }
  .form-card.rise { animation: riseUp 0.8s cubic-bezier(0.22,1,0.36,1) forwards; }
  .form-card.switching { animation: switchOut 0.3s ease forwards; }
  .form-card.switch-in { animation: riseUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards; }

  .form-card img {
    display: block; width: 800px; height: auto; border-radius: 4px;
    user-select: none; -webkit-user-drag: none;
  }

  .hotspot-layer { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; }
  .hbox {
    position: absolute;
    background: rgba(122,158,122,0.12); border: 1.5px solid rgba(122,158,122,0.0);
    border-radius: 2px; cursor: pointer; pointer-events: all;
    transition: background 0.18s ease, border-color 0.18s ease;
  }
  .hbox:hover { background: rgba(122,158,122,0.28); border-color: rgba(122,158,122,0.55); }
  .hbox.active { background: rgba(122,158,122,0.22); border-color: var(--accent); }

  /* ── bubble system ── */
  /* Bubbles are positioned fixed relative to viewport, outside form-card */
  .bbl {
    position: fixed; z-index: 400;
    display: flex; align-items: center; justify-content: center;
    pointer-events: all; cursor: default;
  }
  .bbl.in  { animation: bubbleIn  0.55s cubic-bezier(0.22,1,0.36,1) forwards; }
  .bbl.out { animation: bubbleOut 0.35s ease forwards; pointer-events: none; }
  .bbl-img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; pointer-events: none;
  }
  .bbl-text {
    position: relative; z-index: 1;
    font-family: 'Jost', sans-serif; font-weight: 400;
    font-size: 13px; line-height: 1.55; text-align: center;
    color: rgba(255,255,255,1);
    text-shadow: 0 1px 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.7);
    padding: 28px 40px;
    pointer-events: none;
    width: 100%;
    word-break: break-word;
  }
  .bbl-text.clickable {
    pointer-events: all; cursor: pointer;
    font-size: 15px; font-weight: 500; letter-spacing: 0.05em;
    transition: text-shadow 0.2s;
  }
  .bbl-text.clickable:hover { text-shadow: 0 0 18px rgba(255,255,255,1), 0 1px 8px rgba(0,0,0,0.8); }
  .bbl.sz-sm { width: 160px; height: 160px; }
  .bbl.sz-md { width: 210px; height: 210px; }
  .bbl.sz-lg { width: 360px; height: 360px; }

  .bbl.sz-lg .bbl-text {
    font-size: 14px; line-height: 1.6; padding: 55px 65px;
  }
  @keyframes bubbleIn {
    0%   { opacity: 0; transform: scale(0.5) translateY(40px); }
    60%  { opacity: 1; transform: scale(1.06) translateY(-8px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes bubbleOut {
    0%   { opacity: 1; transform: scale(1) translateY(0); }
    100% { opacity: 0; transform: scale(0.7) translateY(-30px); }
  }

  /* ── keyframes ── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    8% { opacity: 0.9; } 92% { opacity: 0.5; }
    100% { transform: translateY(-100vh) translateX(var(--dx)); opacity: 0; }
  }
  @keyframes riseUp { from { opacity: 0; transform: translateY(60px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes switchOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(30px); } }
</style>
</head>
<body>

<!-- shared layer -->
<div class="scene"></div>
<div class="scene-overlay"></div>
<div class="particles" id="particles"></div>
<div class="veil" id="veil"></div>

<audio id="bgMusic" loop>
  <source src="bg-music.mp3" type="audio/mpeg">
</audio>
<audio id="sndBloop" src="Bloop_sound_effect.mp3"></audio>
<audio id="sndPop" src="bubble_pop_sound_effect.mp3"></audio>

<button class="music-btn" id="musicBtn" title="Toggle music">
  <svg id="iconSound" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
  <svg id="iconMute" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
</button>

<!-- ══ WELCOME VIEW ══ -->
<div class="lang-switcher" id="langSwitcher">
  <button class="lang-btn active" data-lang="en">EN</button>
  <span class="lang-divider">·</span>
  <button class="lang-btn" data-lang="zh">中文</button>
  <span class="lang-divider">·</span>
  <button class="lang-btn" data-lang="es">ES</button>
</div>

<div id="viewWelcome">
  <h1 class="headline" id="headline">
    Still&nbsp;confused?<br>
    <em id="headline-sub">Help me read my 1040.</em>
  </h1>
  <div class="btn-wrap">
    <button class="start-btn" id="startBtn"><span id="btn-text">Get Started</span></button>
  </div>
</div>

<p class="welcome-wordmark" id="welcomeWordmark">ReadMy1040</p>

<!-- ══ FORM VIEW ══ -->
<div id="viewForm">
  <div class="topbar">
    <button class="topbar-wordmark" id="backBtn">ReadMy1040</button>
    <div class="topbar-right">
      <span class="hint">Click any highlighted box to learn what it means</span>
      <button class="page-btn active" id="btn1">Page 1</button>
      <button class="page-btn" id="btn2">Page 2</button>
    </div>
  </div>
  <div class="scroll-wrap">
    <div class="form-card" id="formCard">
      <img id="formImg" src="1040_page-1.png" alt="Form 1040" draggable="false">
      <div class="hotspot-layer" id="hotspots"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// MUSIC
// ══════════════════════════════════════════════
const music = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');
const iconSound = document.getElementById('iconSound');
const iconMute = document.getElementById('iconMute');
music.volume = 0.35;
let musicStarted = false;

function tryStartMusic() {
  if (!musicStarted) {
    music.play().then(() => { musicStarted = true; }).catch(() => {});
  }
}
document.addEventListener('click', tryStartMusic, { once: true });

musicBtn.addEventListener('click', e => {
  e.stopPropagation();
  tryStartMusic();
  if (music.paused) {
    music.play();
    iconSound.style.display = ''; iconMute.style.display = 'none';
  } else {
    music.pause();
    iconSound.style.display = 'none'; iconMute.style.display = '';
  }
});

// ══════════════════════════════════════════════
// PARTICLES
// ══════════════════════════════════════════════
const pContainer = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 7 + 3;
  p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;bottom:${Math.random()*40}%;--dx:${(Math.random()-0.5)*80}px;animation-duration:${Math.random()*10+7}s;animation-delay:${Math.random()*10}s;filter:blur(${Math.random()*1.2}px);`;
  pContainer.appendChild(p);
}

function spawnBurst(refEl) {
  const rect = refEl.getBoundingClientRect();
  for (let i = 0; i < 3; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 8 + 4;
    p.style.cssText = `width:${size}px;height:${size}px;position:fixed;left:${rect.left + Math.random()*rect.width}px;top:${rect.top + Math.random()*rect.height*0.5}px;--dx:${(Math.random()-0.5)*100}px;animation-duration:${Math.random()*2+1.5}s;animation-delay:0s;pointer-events:none;z-index:400;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3500);
  }
}

// ══════════════════════════════════════════════
// LANGUAGE
// ══════════════════════════════════════════════
let currentLang = 'en';
const copy = {
  en: { line1: 'Still\u00a0confused?', line2: 'Help me read my 1040.', btn: 'Get Started', hint: 'Click any highlighted box to learn what it means' },
  zh: { line1: '税单看不懂？', line2: '帮我读懂 1040。', btn: '开始', hint: '点击任意高亮格子了解它的含义' },
  es: { line1: '¿Todavía\u00a0confundido?', line2: 'Ayúdame a leer mi 1040.', btn: 'Comenzar', hint: 'Haz clic en cualquier casilla para ver su significado' }
};

function applyLang(lang) {
  currentLang = lang;
  const h = document.getElementById('headline');
  h.style.opacity = '0'; h.style.transform = 'translateY(8px)';
  setTimeout(() => {
    h.firstChild.textContent = copy[lang].line1 + '\n';
    document.getElementById('headline-sub').textContent = copy[lang].line2;
    document.getElementById('btn-text').textContent = copy[lang].btn;
    document.querySelector('.hint').textContent = copy[lang].hint;
    h.style.opacity = '1'; h.style.transform = 'translateY(0)';
  }, 300);
}

document.querySelectorAll('.lang-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    applyLang(b.dataset.lang);
  });
});

// ══════════════════════════════════════════════
// VIEW SWITCHING
// ══════════════════════════════════════════════
function showForm() {
  const veil = document.getElementById('veil');
  for (let i = 0; i < 40; i++) setTimeout(() => spawnBurst(document.getElementById('startBtn')), i * 30);
  setTimeout(() => veil.classList.add('go'), 100);
  setTimeout(() => {
    document.getElementById('viewWelcome').classList.add('hidden');
    document.getElementById('welcomeWordmark').style.display = 'none';
    document.getElementById('langSwitcher').style.display = 'none';
    document.getElementById('viewForm').classList.add('visible');
    const card = document.getElementById('formCard');
    card.classList.add('rise');
    setTimeout(() => card.classList.remove('rise'), 900);
    veil.classList.remove('go');
    render(P1);
  }, 700);
}

function showWelcome() {
  const veil = document.getElementById('veil');
  veil.classList.add('go');
  setTimeout(() => {
    document.getElementById('viewForm').classList.remove('visible');
    document.getElementById('viewWelcome').classList.remove('hidden');
    document.getElementById('welcomeWordmark').style.display = '';
    document.getElementById('langSwitcher').style.display = '';
    veil.classList.remove('go');
    currentFormPage = 1;
    document.getElementById('formImg').src = '1040_page-1.png';
    document.getElementById('btn1').classList.add('active');
    document.getElementById('btn2').classList.remove('active');
  }, 700);
}

// button hover burst
let burstTimer = null;
const startBtn = document.getElementById('startBtn');
startBtn.addEventListener('mouseenter', () => { spawnBurst(startBtn); burstTimer = setInterval(() => spawnBurst(startBtn), 300); });
startBtn.addEventListener('mouseleave', () => { clearInterval(burstTimer); });
startBtn.addEventListener('click', showForm);
document.getElementById('backBtn').addEventListener('click', showWelcome);

// ══════════════════════════════════════════════
// FORM / 1040 LOGIC
// ══════════════════════════════════════════════
const IMG_W = 1700, IMG_H = 2200;
let currentFormPage = 1;
let activeBox = null;
const liveBubbles = {}; // key: 'b0','b1','b2','b3'

// ── sound helpers ─────────────────────────────────────────────────
function playBloop() {
  const s = document.getElementById('sndBloop');
  s.currentTime = 0; s.volume = 0.5;
  s.play().catch(()=>{});
}
function playPop() {
  const s = document.getElementById('sndPop');
  s.currentTime = 0; s.volume = 0.5;
  s.play().catch(()=>{});
}

// ── multilingual content ──────────────────────────────────────────
const HINT = {
  en: 'Click any highlighted box\nto learn what it means',
  zh: '点击任意高亮格子\n了解它的含义',
  es: 'Haz clic en cualquier\ncasilla resaltada'
};

const SHORT = {
  en: {
    'filing-status': 'How you file — affects your tax rate & deduction.',
    'digital-assets': 'Did you buy, sell, or receive crypto in 2025?',
    'line-1a': 'W-2 wages — from Box 1 of your W-2.',
    'line-1b': 'Wages paid to household employees not on W-2.',
    'line-1c': 'Tip income not reported to your employer.',
    'line-1d': 'Medicaid waiver payments not on W-2.',
    'line-1e': 'Taxable employer-provided dependent care benefits.',
    'line-1f': 'Employer adoption benefits above the tax-free limit.',
    'line-1g': 'Wages from Form 8919 (misclassified workers).',
    'line-1i': 'Military only: nontaxable combat pay election.',
    'line-1z': 'Total of all wage lines (1a–1h).',
    'line-2a': 'Tax-exempt interest (e.g. municipal bonds).',
    'line-2b': 'Taxable interest from bank accounts, CDs, bonds.',
    'line-3a': 'Qualified dividends — taxed at a lower rate.',
    'line-3b': 'All ordinary dividends from stocks or funds.',
    'line-4a': 'Total IRA withdrawals (gross amount).',
    'line-4b': 'Taxable portion of your IRA withdrawal.',
    'line-5a': 'Total pension, annuity, or 401(k) distributions.',
    'line-5b': 'Taxable portion of your pension or 401(k).',
    'line-6a': 'Total Social Security benefits received.',
    'line-6b': 'Taxable portion of Social Security (up to 85%).',
    'line-7a': 'Capital gains or losses from selling investments.',
    'line-8': 'Other income from Schedule 1 (self-employment, rent…).',
    'line-9': 'Grand total income before any deductions.',
    'line-10': 'Above-the-line deductions that reduce your AGI.',
    'line-11a': 'Adjusted Gross Income — the key number on your return.',
    'line-11b': 'AGI carried over from Page 1.',
    'line-12e': 'Standard or itemized deduction (whichever is larger).',
    'line-13a': 'Qualified business income deduction (self-employed).',
    'line-14': 'Total deductions subtracted from your AGI.',
    'line-15': 'Taxable income — what your tax rate is applied to.',
    'line-16': 'Federal income tax from the IRS tax table.',
    'line-17': 'Additional taxes from Schedule 2 (e.g. AMT).',
    'line-18': 'Total tax before credits.',
    'line-19': 'Child tax credit — up to $2,000 per qualifying child.',
    'line-20': 'Other credits from Schedule 3.',
    'line-22': 'Tax remaining after all credits are applied.',
    'line-23': 'Other taxes — mainly self-employment tax (15.3%).',
    'line-24': 'Your total federal tax for the year.',
    'line-25a': 'Federal tax withheld from W-2 wages.',
    'line-25b': 'Federal tax withheld from 1099 income.',
    'line-25d': 'Total federal tax withheld (25a + 25b + 25c).',
    'line-26': 'Estimated tax payments made during the year.',

// ── bubble positioning ────────────────────────────────────────────

function bblPos(slot, size) {
  const vh = window.innerHeight;
  // 右侧泡泡用right定位，避免超出
  const rightSlots = { topRight: true, bottomRight: true, midRight: true };
  if (rightSlots[slot]) {
    const right = 24;
    const tops = {
      topRight:    100,
      bottomRight: vh - size - 40,
      midRight:    Math.max(100, (vh - size) / 2),
    };
    return { right, top: tops[slot], useRight: true };
  }
  // 左侧泡泡
  const tops = {
    topLeft:    160,
    bottomLeft: vh - size - 40,
  };
  return { left: 80, top: tops[slot] || 160, useRight: false };
}

function makeBubble(key, slot, sizeClass, text, isClickable, onClick) {
  dismissBubble(key, false);
  const size = sizeClass === 'sz-sm' ? 160 : sizeClass === 'sz-md' ? 210 : 360;
  const pos = bblPos(slot, size);

  const el = document.createElement('div');
  el.className = `bbl ${sizeClass} in`;
  if (pos.useRight) {
    el.style.cssText = `right:${pos.right}px; top:${pos.top}px;`;
  } else {
    el.style.cssText = `left:${pos.left}px; top:${pos.top}px;`;
  }
  el.innerHTML = `<img class="bbl-img" src="bubble.png" alt=""><span class="bbl-text${isClickable ? ' clickable' : ''}">${text}</span>`;

  if (isClickable && onClick) {
    el.querySelector('.bbl-text').addEventListener('click', e => { e.stopPropagation(); onClick(); });
  }

  document.body.appendChild(el);
  liveBubbles[key] = el;
  playBloop();
  return el;
}

function dismissBubble(key, withSound = true) {
  const el = liveBubbles[key];
  if (!el) return;
  if (withSound) playPop();
  el.classList.remove('in');
  el.classList.add('out');
  setTimeout(() => { el.remove(); }, 400);
  delete liveBubbles[key];
}

function dismissAll(withSound = false) {
  Object.keys(liveBubbles).forEach(k => dismissBubble(k, withSound));
  if (activeBox) { activeBox.classList.remove('active'); activeBox = null; }
}

// ── show bubble sequence ──────────────────────────────────────────
function showBoxBubbles(b) {
  dismissAll(true);
  activeBox && activeBox.classList.remove('active');

  // b1: one-liner, top-left
  const shortText = (SHORT[currentLang] || SHORT.en)[b.id] || SHORT.en[b.id] || b.tag;
  makeBubble('b1', 'topLeft', 'sz-md', shortText, false, null);

  // b2: tell me more, bottom-right
  const moreLbl = currentLang === 'zh' ? '了解更多 →' : currentLang === 'es' ? 'Más info →' : 'Tell me more →';
  makeBubble('b2', 'bottomRight', 'sz-sm', moreLbl, true, () => {
    dismissBubble('b0', true);
    dismissBubble('b2', true);
    // b3: detail, mid-right
    const detail = getDetail(b.id);
    setTimeout(() => {
      makeBubble('b3', 'midRight', 'sz-lg', detail, false, null);
    }, 200);
  });
}

function showB0() {
  if (!document.getElementById('viewForm').classList.contains('visible')) return;
  const hintText = HINT[currentLang] || HINT.en;
  makeBubble('b0', 'topRight', 'sz-md', hintText, false, null);
}

// ── render ────────────────────────────────────────────────────────
function render(boxes) {
  const layer = document.getElementById('hotspots');
  layer.innerHTML = '';
  const img = document.getElementById('formImg');
  const scaleX = img.offsetWidth / IMG_W;
  const scaleY = img.offsetHeight / IMG_H;
  layer.style.height = img.offsetHeight + 'px';
  boxes.forEach(b => {
    const el = document.createElement('div');
    el.className = 'hbox';
    el.style.cssText = `left:${b.x*scaleX}px;top:${b.y*scaleY}px;width:${b.w*scaleX}px;height:${b.h*scaleY}px;`;
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (activeBox === el) { dismissAll(true); return; }
      activeBox = el; el.classList.add('active');
      showBoxBubbles(b);
    });
    layer.appendChild(el);
  });
  // show b0 hint after card rises
  setTimeout(showB0, 900);
}

// close all on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.bbl') && !e.target.closest('.hbox')) {
    dismissAll(true);
    setTimeout(showB0, 600);
  }
});

function switchPage(toPage) {
  if (currentFormPage === toPage) return;
  dismissAll(false);
  const card = document.getElementById('formCard');
  card.classList.add('switching');
  setTimeout(() => {
    currentFormPage = toPage;
    document.getElementById('formImg').src = toPage === 1 ? '1040_page-1.png' : '1040_page-2.png';
    document.getElementById('btn1').classList.toggle('active', toPage === 1);
    document.getElementById('btn2').classList.toggle('active', toPage === 2);
    card.classList.remove('switching');
    card.classList.add('switch-in');
    document.getElementById('formImg').onload = () => {
      render(toPage === 1 ? P1 : P2);
      setTimeout(() => card.classList.remove('switch-in'), 600);
    };
  }, 300);
}

document.getElementById('btn1').addEventListener('click', () => switchPage(1));
document.getElementById('btn2').addEventListener('click', () => switchPage(2));

window.addEventListener('load', () => {
  document.getElementById('formImg').onload = () => render(P1);
  if (document.getElementById('formImg').complete) render(P1);
});
window.addEventListener('resize', () => {
  // reposition live bubbles on resize
  currentFormPage === 1 ? render(P1) : render(P2);
});
</script>
